spring.application.name=aws-ldc

# This is the "Magic Line" for Spring Boot 3.x
# It tells Spring: "Go to AWS SSM and get everything under /app/ before starting"
spring.config.import=aws-parameterstore:/app/

# Now you can use the relative names (everything after /app/)
# Note: Spring converts slashes to dots. /app/cognito/user-pool-id becomes cognito.user-pool-id
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.us-east-1.amazonaws.com/${cognito.user-pool-id}

# Static region for the SDK
spring.cloud.aws.region.static=us-east-1